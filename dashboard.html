<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UnderPixel Dashboard</title>



    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

     <link rel="stylesheet" href="dashboard.css">   

</head>

<body>
    <nav>
        <div class="logo">
            <i class="fa-solid fa-gamepad"></i>
            <h2>UnderPixel</h2>
        </div>
        <div class="menu">
            <a href="#" class="active">Home</a>
            <a href="#">Games</a>
            <a href="leaderboard.html" >Leaderboard</a>
            <a href="#">Settings</a>
        </div>
        <div class="right-section">
            <input type="text" class="search-box" placeholder="Search Game">
            


            <div class="profile">
              <i class="fa-solid fa-user"></i>  
            </div>

        </div>
    </nav>
    <section class="hero">
        <button class="prev">&#10094;</button>
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Play. Compete. Conquer</h1>
            <p>Discover the Best Free Browser Games </p>
            <button class="play-btn">Play Now</button>
        </div>
        <button class="next">&#10095;</button>
        <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
              
        </div>

    </section>

    
    //-----games section ------//

    <section class="games">

    <h2 class="section-title">🔥 Trending Games</h2>

    <div class="game-container">

        <div class="game-card">
            <img src="images/gta.jpg" alt="">
            <h3>GTA V</h3>
            <button>Play Now</button>
        </div>

        <div class="game-card">
            <img src="images/valorant.jpg" alt="">
            <h3>Valorant</h3>
            <button>Play Now</button>
        </div>

        <div class="game-card">
            <img src="images/minecraft.jpg" alt="">
            <h3>Minecraft</h3>
            <button>Play Now</button>
        </div>

        <div class="game-card">
            <img src="images/bgmi.jpg" alt="">
            <h3>BGMI</h3>
            <button>Play Now</button>
        </div>

    </div>

</section>
    <script src="js/dashboard.js"></script>

</body>

</html>
